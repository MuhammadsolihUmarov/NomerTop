server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Essential headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 1. FastAPI Backend Routes
    # We route specific backend prefixes directly to the Python server (port 8000)
    location ~ ^/(auth|plates|messages|users)(/.*)?$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
    }

    # 2. Next.js Frontend NextAuth Route
    # NextAuth specifically needs to reach the frontend via /api/auth
    location /api/auth/ {
        proxy_pass http://127.0.0.1:3000/api/auth/;
        proxy_http_version 1.1;
    }

    # 3. Next.js Frontend
    # All other traffic goes to the Next.js server (port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # Gzip settings for performance
    gzip on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/css application/javascript image/svg+xml;
}
